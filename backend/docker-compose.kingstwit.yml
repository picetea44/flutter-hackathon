version: '3.8'

services:
  kingstwit-mysql:
    image: mysql:8.0
    container_name: kingstwit-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${KINGSTWIT_DB_PASSWORD}
      MYSQL_DATABASE: ${KINGSTWIT_DB_NAME}
      MYSQL_USER: ${KINGSTWIT_DB_USER}
      MYSQL_PASSWORD: ${KINGSTWIT_DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - kingstwit-mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kingstwit-network

  kingstwit-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kingstwit-backend
    depends_on:
      kingstwit-mysql:
        condition: service_healthy
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:mysql://${KINGSTWIT_DB_HOST}:${KINGSTWIT_DB_PORT}/${KINGSTWIT_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${KINGSTWIT_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${KINGSTWIT_DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_URL: jdbc:mysql://${KINGSTWIT_DB_HOST}:${KINGSTWIT_DB_PORT}/${KINGSTWIT_DB_NAME}
      DB_USERNAME: ${KINGSTWIT_DB_USER}
      DB_PASSWORD: ${KINGSTWIT_DB_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - kingstwit-network
    restart: unless-stopped

volumes:
  kingstwit-mysql-data:
    driver: local

networks:
  kingstwit-network:
    driver: bridge
